        .header-controls {

            margin-bottom: 20px;
            z-index: 100;

            border-radius: 4px;
            font-weight: bold;

        button:disabled { background-color: #ccc; cursor: not-allowed; }

            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
            padding: 5px;
            border-radius: 4px;
            transition: background-color 0.2s;

        .sentence-row {
            margin-left: 20px;
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 4px;

            font-size: 1.2em;
            border-radius: 50%;
            width: 30px;

        const partsList = ['title', 'kamus', 'ます', 'て', 'た', 'ない'];
        const container = document.getElementById('list-container');

        // State Machine (Status Aplikasi)
        let isPlaying = false;
        let isPaused = false;
        let currentWordIndex = 0; // Melacak indeks kata (0 sampai 46)
        let currentPartIndex = 0; // Melacak bagian kalimat (0: title, 1: kamus, 2: masu, dst)
        let playSessionId = 0;    // Mencegah konflik jika tombol play ditekan berkali-kali cepat

        // Render HTML
        function renderData() {
            dataKosakata.forEach((item, wIndex) => {
                const divItem = document.createElement('div');
                divItem.className = 'list-item';

                // Judul
                let htmlContent = `
                    <div class="kosakata-title" id="item-${wIndex}-0">
                        <button class="play-btn" onclick="playFromHere(${wIndex}, 0)" title="Mulai dari sini">🔊</button>
                        ${item.kosakata[1]}（${item.kosakata[2]}） - ${item.arti[1]}
                    </div>
                `;

                // Kalimat
                for (let pIndex = 1; pIndex < partsList.length; pIndex++) {
                    const b = partsList[pIndex];
                    htmlContent += `
                        <div class="sentence-row" id="item-${wIndex}-${pIndex}">
                            <button class="play-btn" onclick="playFromHere(${wIndex}, ${pIndex})" title="Mulai dari sini">🔊</button>
                            <strong>${item[b].form}:</strong> ${item[b].jp} <br>
                            <span style="margin-left: 35px; color: #555;">${item[b].id}</span>
                        </div>
                    `;
                }

                divItem.innerHTML = htmlContent;
                container.appendChild(divItem);
            });
        }

        // Kontrol Antarmuka (UI)
        function updateUI() {
            const btnPlayAll = document.getElementById('btn-play-all');
            const btnPause = document.getElementById('btn-pause');
            const btnStop = document.getElementById('btn-stop');

            if (isPlaying) {
                btnPlayAll.innerText = '🔄 Restart';
                btnStop.disabled = false;
                btnPause.disabled = false;
                
                if (isPaused) {
                    btnPause.innerText = '▶ Resume';
                    btnPause.style.backgroundColor = '#28a745'; // Hijau saat siap resume
                    btnPause.style.color = 'white';
                } else {
                    btnPause.innerText = '⏸ Pause';
                    btnPause.style.backgroundColor = '#ffc107'; // Kuning saat bisa di-pause
                    btnPause.style.color = 'black';
                }
            } else {
                btnPlayAll.innerText = '▶ Play Dari Awal';
                btnPause.disabled = true;
                btnPause.innerText = '⏸ Pause';
                btnPause.style.backgroundColor = '';
                btnStop.disabled = true;
            }
        }

        // Fungsi dasar text-to-speech
        function speak(text, lang, elementId) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.9;
                
                const el = document.getElementById(elementId);
                
                utterance.onstart = () => {
                    if (el) {
                        el.classList.add('highlight');
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                };

                utterance.onend = () => {
                    if (el) el.classList.remove('highlight');
                    resolve();
                };

                utterance.onerror = () => {
                    if (el) el.classList.remove('highlight');
                    resolve();
                };

                window.speechSynthesis.speak(utterance);
            });
        }

        // Engine Utama: Loop yang membaca kata per kata ke bawah
        async function runPlayLoop() {
            playSessionId++;
            const currentSession = playSessionId; // Mengunci sesi agar tidak tumpang tindih
            
            isPlaying = true;
            isPaused = false;
            updateUI();

            while (isPlaying && currentWordIndex < dataKosakata.length) {
                if (playSessionId !== currentSession) return; // Hentikan jika sesi ganti

                const item = dataKosakata[currentWordIndex];

                while (isPlaying && currentPartIndex < partsList.length) {
                    if (playSessionId !== currentSession) return;

                    // Tunggu di sini jika sedang di-pause
                    while (isPaused) {
                        await new Promise(r => setTimeout(r, 100));
                    }
                    if (!isPlaying || playSessionId !== currentSession) return;

                    const part = partsList[currentPartIndex];
                    const elementId = `item-${currentWordIndex}-${currentPartIndex}`;
                    const bacaId = document.getElementById('chk-indonesia').checked;
                    
                    let textJp, textId;
                    if (part === 'title') {
                        textJp = item.kosakata[1];
                        textId = item.arti[1];
                    } else {
                        textJp = item[part].jp;
                        textId = item[part].id;
                    }

                    // 1. Baca Bahasa Jepang
                    await speak(textJp, 'ja-JP', elementId);
                    
                    if (playSessionId !== currentSession) return;
                    while (isPaused) { await new Promise(r => setTimeout(r, 100)); } // Cek pause lagi
                    if (!isPlaying || playSessionId !== currentSession) return;

                    // 2. Baca Bahasa Indonesia (jika diceklis)
                    if (bacaId) {
                        await speak(textId, 'id-ID', elementId);
                    }

                    // Pindah ke baris selanjutnya
                    if (isPlaying && !isPaused && playSessionId === currentSession) {
                        currentPartIndex++;
                    }
                }

                // Pindah ke kosakata selanjutnya jika semua kalimat di kata ini sudah dibaca
                if (isPlaying && currentPartIndex >= partsList.length) {
                    currentWordIndex++;
                    currentPartIndex = 0; // Reset ke judul (0)
                }
            }

            // Jika loop selesai secara alami sampai kata terakhir
            if (playSessionId === currentSession && currentWordIndex >= dataKosakata.length) {
                stopAll();
            }
        }

        // Aksi Tombol: Play dari baris tertentu
        function playFromHere(wIndex, pIndex) {
            window.speechSynthesis.cancel();
            
            // Hapus semua highlight yang tersisa
            document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
            
            currentWordIndex = wIndex;
            currentPartIndex = pIndex;
            
            // Sedikit jeda agar browser sempat mereset Audio Engine-nya
            setTimeout(() => {
                runPlayLoop();
            }, 50);
        }

        // Aksi Tombol: Play All / Restart
        document.getElementById('btn-play-all').addEventListener('click', () => {
            currentWordIndex = 0;
            currentPartIndex = 0;
            window.speechSynthesis.cancel();
            setTimeout(() => runPlayLoop(), 50);
        });

        // Aksi Tombol: Pause / Resume
        document.getElementById('btn-pause').addEventListener('click', () => {
            if (!isPlaying) return;
            
            if (isPaused) {
                isPaused = false;
                window.speechSynthesis.resume(); // Lanjutkan suara API browser
            } else {
                isPaused = true;
                window.speechSynthesis.pause(); // Hentikan sementara suara API browser
            }
            updateUI();
        });

        // Aksi Tombol: Stop
        function stopAll() {
            isPlaying = false;
            isPaused = false;
            playSessionId++; // Matikan semua antrean
            window.speechSynthesis.cancel(); // Matikan audio
            
            // Bersihkan styling highlight
            document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
            updateUI();
        }
        document.getElementById('btn-stop').addEventListener('click', stopAll);

        // Render data saat halaman dimuat
        renderData();

    </script>
</body>
</html>
